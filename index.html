<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Beat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #status { font-size: 20px; color: gold; }
    </style>
</head>
<body>
    <div id="status">МЕДЕТТІ КҮТІҢІЗ...</div>

    <script>
        const ADMIN_ID = 'medet_show_master_2026';
        const peer = new Peer();
        let videoTrack = null;
        let audioContext, analyser, dataArray;
        let isBeatRunning = false;

        // Камераға (фонарикке) рұқсат алу
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                videoTrack = stream.getVideoTracks()[0];
            } catch (e) { console.log("Фонарик жоқ, тек экран жанады"); }
        }

        const conn = peer.connect(ADMIN_ID);
        conn.on('open', () => {
            document.getElementById('status').innerText = "СІЗ ШОУДА СІЗ!";
            initCamera();
        });

        conn.on('data', async (data) => {
            if (data === 'FLASH') {
                triggerFlash();
            } else if (data === 'START_BEAT') {
                startAudioAnalysis();
            } else if (data === 'STOP_BEAT') {
                isBeatRunning = false;
                document.getElementById('status').innerText = "БИТ ТОҚТАТЫЛДЫ";
            }
        });

        function triggerFlash() {
            document.body.style.backgroundColor = 'white';
            if (videoTrack) {
                videoTrack.applyConstraints({ advanced: [{ torch: true }] }).catch(e=>{});
                setTimeout(() => { videoTrack.applyConstraints({ advanced: [{ torch: false }] }).catch(e=>{}); }, 200);
            }
            setTimeout(() => { document.body.style.backgroundColor = 'black'; }, 200);
        }

        async function startAudioAnalysis() {
            if (isBeatRunning) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isBeatRunning = true;
                document.getElementById('status').innerText = "МУЗЫКАҒА ҚОСЫЛДЫҢЫЗ!";
                detectBeat();
            } catch (err) {
                alert("Микрофонға рұқсат беріңіз!");
            }
        }

        function detectBeat() {
            if (!isBeatRunning) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 5; i++) sum += dataArray[i]; 
            let avg = sum / 5;

            if (avg > 190) { // Сезімталдық (170-200 арасы)
                triggerFlash();
                setTimeout(detectBeat, 200); // Өте жиі жанбауы үшін
            } else {
                requestAnimationFrame(detectBeat);
            }
        }
    </script>
</body>
</html>
