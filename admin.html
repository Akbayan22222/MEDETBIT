<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Beat Control</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 50px; }
        .panel { background: #2a2a2a; padding: 30px; border-radius: 20px; display: inline-block; width: 80%; }
        #count { font-size: 50px; color: #00ffcc; }
        button { width: 100%; height: 80px; margin: 10px 0; border-radius: 15px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        .btn-flash { background: #007bff; color: white; }
        .btn-beat { background: #ff3b30; color: white; }
        .active { background: #28a745 !important; box-shadow: 0 0 20px #28a745; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>ADMIN BEAT MASTER</h2>
        <div id="count">0</div>
        <p>Қонақтар саны</p>
        
        <button class="btn-flash" onclick="sendFlash()">БІР РЕТ ЖАҒУ (Manual)</button>
        <button id="beatBtn" class="btn-beat" onclick="toggleAutoBeat()">АВТО-БИТТІ ҚОСУ</button>
    </div>

    <script>
        const ADMIN_ID = 'medet_show_master_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];
        let beatActive = false;

        peer.on('connection', (conn) => {
            connections.push(conn);
            document.getElementById('count').innerText = connections.length;
        });

        function sendFlash() {
            connections.forEach(conn => { if(conn.open) conn.send('FLASH'); });
        }

        function toggleAutoBeat() {
            beatActive = !beatActive;
            const btn = document.getElementById('beatBtn');
            if(beatActive) {
                btn.classList.add('active');
                btn.innerText = "БИТ РЕЖИМІ ҚОСУЛЫ";
                connections.forEach(conn => { if(conn.open) conn.send('START_BEAT'); });
            } else {
                btn.classList.remove('active');
                btn.innerText = "АВТО-БИТТІ ҚОСУ";
                connections.forEach(conn => { if(conn.open) conn.send('STOP_BEAT'); });
            }
        }
    </script>
</body>
</html>
