<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Control Panel</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { background: #2a2a2a; padding: 40px; border-radius: 20px; text-align: center; width: 80%; max-width: 500px; }
        #count { font-size: 48px; color: #00ffcc; margin: 20px 0; }
        button { width: 100%; height: 100px; font-size: 25px; border-radius: 15px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .beat-btn { background: #ff3b30; height: 60px; font-size: 18px; }
        .active-beat { background: #28a745; box-shadow: 0 0 15px #28a745; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>УПРАВЛЕНИЕ ЗАЛОМ</h2>
        <div id="count">0</div>
        <p>Гостей подключено</p>
        <button onclick="sendFlash()">🔥 ЗАЖЕЧЬ ЗАЛ 🔥</button>
        <button id="beatBtn" class="beat-btn" onclick="toggleBeatMode()">ВКЛЮЧИТЬ АВТО-БИТ</button>
    </div>

    <script>
        const ADMIN_ID = 'medet_show_master_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];
        let isBeatMode = false;

        peer.on('connection', (conn) => {
            connections.push(conn);
            document.getElementById('count').innerText = connections.length;
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                document.getElementById('count').innerText = connections.length;
            });
        });

        function sendFlash() {
            connections.forEach(conn => { if (conn.open) conn.send('FLASH'); });
        }

        function toggleBeatMode() {
            isBeatMode = !isBeatMode;
            const btn = document.getElementById('beatBtn');
            if (isBeatMode) {
                btn.classList.add('active-beat');
                btn.innerText = "АВТО-БИТ: РАБОТАЕТ";
                connections.forEach(conn => { if (conn.open) conn.send('START_BEAT_LISTEN'); });
            } else {
                btn.classList.remove('active-beat');
                btn.innerText = "ВКЛЮЧИТЬ АВТО-БИТ";
                connections.forEach(conn => { if (conn.open) conn.send('STOP_BEAT_LISTEN'); });
            }
        }
    </script>
</body>
</html>
